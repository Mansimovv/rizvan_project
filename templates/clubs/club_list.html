{% extends 'base.html' %}
{% block content %}
<h2>Klublar</h2>
<div class="row">
    {% for club in clubs %}
    <div class="col-md-4">
        <div class="card mb-3">
            <div class="card-body">
                <h5 class="card-title">{{ club.name }}</h5>
                <p class="card-text">{{ club.description }}</p>
                <p class="card-text"><small class="text-muted">Yaradılma tarixi: {{ club.created_at|date:"d.m.Y" }}</small></p>
                {% if user.is_authenticated %}
                    <a href="{% url 'join_club' club.id %}" class="btn btn-primary">Qoşul</a>
                {% else %}
                    <a href="{% url 'login' %}" class="btn btn-secondary">Daxil ol</a>
                {% endif %}
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
