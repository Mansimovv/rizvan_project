{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7 col-lg-6">
        <div class="card shadow p-4 border-0" style="border-radius: 18px;">
            <h2 class="text-center mb-4" style="color:#4f46e5; font-weight:700;">Qeydiyyat</h2>
            <form method="post" novalidate>
                {% csrf_token %}
                {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label" for="id_{{ field.name }}">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}
                            <div class="text-danger small">{{ field.errors|striptags }}</div>
                        {% endif %}
                    </div>
                {% endfor %}
                <button type="submit" class="btn btn-primary w-100 py-2 mt-2">Qeydiyyatdan keç</button>
            </form>
            <div class="text-center mt-3">
                <span>Artıq hesabınız var? <a href="{% url 'login' %}" style="color:#4f46e5; font-weight:500;">Daxil ol</a></span>
            </div>
        </div>
    </div>
</div>
{% endblock %}
